<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="calculator-box shadow-lg p-4">
        <div class="screen-area mb-4 px-3 py-2 text-end">
            <div id="calc-history" class="text-muted small"></div>
            <div id="calc-display" class="main-display">0</div>
        </div>

        <div class="row g-2">
            <div class="col-3"><button class="btn btn-action w-100" onclick="clearAll()">C</button></div>
            <div class="col-3"><button class="btn btn-action w-100" onclick="deleteLast()"><i class="bi bi-backspace"></i></button></div>
            <div class="col-3"><button class="btn btn-action w-100" onclick="inputOperator('%')">%</button></div>
            
            <div class="col-3"><button class="btn btn-operator w-100" onclick="inputOperator('/')">÷</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('7')">7</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('8')">8</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('9')">9</button></div>
            <div class="col-3"><button class="btn btn-operator w-100" onclick="inputOperator('*')">×</button></div>

            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('4')">4</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('5')">5</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('6')">6</button></div>
            <div class="col-3"><button class="btn btn-operator w-100" onclick="inputOperator('-')">-</button></div>

            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('1')">1</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('2')">2</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputNum('3')">3</button></div>
            <div class="col-3"><button class="btn btn-operator w-100" onclick="inputOperator('+')">+</button></div>
            
            <div class="col-6"><button class="btn btn-num w-100" onclick="inputNum('0')">0</button></div>
            <div class="col-3"><button class="btn btn-num w-100" onclick="inputDecimal('.')">.</button></div>
            <div class="col-3"><button class="btn btn-equal w-100" onclick="executeCalculation()">=</button></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
